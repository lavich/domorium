version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Nicosia
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gradle
    directory: /apps/jetbrains
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Nicosia
    open-pull-requests-limit: 5
    groups:
      gradle-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Nicosia
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
