name: Release JetBrains Plugin

on:
  push:
    tags: ["jetbrains-v*.*.*"]

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/quality.yml

  publish:
    needs: checks
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - run: npm ci
        env:
          LEFTHOOK: 0
      - name: Verify tagged commit belongs to main
        run: git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'
      - name: Verify JetBrains version
        working-directory: apps/jetbrains
        run: test "${GITHUB_REF_NAME#jetbrains-v}" = "$(./gradlew properties -q | awk '/^version:/ { print $2 }')"
      - name: Publish plugin
        run: ./gradlew publishPlugin
        working-directory: apps/jetbrains
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
