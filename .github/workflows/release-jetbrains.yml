name: Release JetBrains Plugin

on:
  push:
    tags: ["jetbrains-v*.*.*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
      - run: npm ci
        env:
          LEFTHOOK: 0
      - name: Verify tagged commit belongs to main
        run: git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
      - name: Verify JetBrains version
        working-directory: apps/jetbrains
        run: test "${GITHUB_REF_NAME#jetbrains-v}" = "$(./gradlew properties -q | awk '/^version:/ { print $2 }')"
      - name: Publish plugin
        run: ./gradlew publishPlugin
        working-directory: apps/jetbrains
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
