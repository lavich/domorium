name: Release VS Code Extension

on:
  push:
    tags: ["vscode-v*.*.*"]

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/quality.yml

  publish:
    needs: checks
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          LEFTHOOK: 0
      - name: Verify tagged commit belongs to main
        run: git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'
      - name: Verify VS Code version
        run: test "${GITHUB_REF_NAME#vscode-v}" = "$(node -p "require('./apps/vscode/package.json').version")"
      - name: Publish extension
        run: npx vsce publish
        working-directory: apps/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
