name: Release VS Code Extension

on:
  push:
    tags: ["vscode-v*.*.*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          LEFTHOOK: 0
      - name: Verify tagged commit belongs to main
        run: git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
      - name: Verify VS Code version
        run: test "${GITHUB_REF_NAME#vscode-v}" = "$(node -p "require('./apps/vscode/package.json').version")"
      - name: Publish extension
        run: npx vsce publish
        working-directory: apps/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
