name: Reusable Quality Gates

on:
  workflow_call:
    inputs:
      run_quality:
        description: Run ESLint and TypeScript checks
        required: false
        type: boolean
        default: true
      run_tests:
        description: Run the TypeScript test suite
        required: false
        type: boolean
        default: true
      run_web:
        description: Build the web editor
        required: false
        type: boolean
        default: true
      run_vscode:
        description: Build the VS Code extension
        required: false
        type: boolean
        default: true
      run_jetbrains:
        description: Run the JetBrains plugin build and compatibility checks
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  quality:
    if: inputs.run_quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          LEFTHOOK: 0
      - run: npm run lint
      - run: npm run typecheck

  test:
    if: inputs.run_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          LEFTHOOK: 0
      - run: npm run test:run -- --coverage
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build-web:
    if: inputs.run_web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          LEFTHOOK: 0
      - run: npm run build:libs
      - run: npm run build -w apps/web-editor
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: apps/web-editor/dist

  build-vscode:
    if: inputs.run_vscode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          LEFTHOOK: 0
      - run: npm run build:vscode

  build-jetbrains:
    if: inputs.run_jetbrains
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success
      - run: npm ci
        env:
          LEFTHOOK: 0
      - run: ./gradlew spotlessCheck test buildPlugin verifyPlugin
        working-directory: apps/jetbrains
