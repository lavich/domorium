name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      jetbrains: ${{ steps.filter.outputs.jetbrains }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect JetBrains-related changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "jetbrains=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            COMPARE_SHA="$BASE_SHA"
          elif [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "jetbrains=true" >> "$GITHUB_OUTPUT"
            exit 0
          else
            COMPARE_SHA="$BEFORE_SHA"
          fi

          if git diff --quiet "$COMPARE_SHA" "$HEAD_SHA" -- \
            .github/workflows/ci.yml \
            .github/workflows/quality.yml \
            apps/jetbrains \
            packages/lsp \
            packages/validator \
            package.json \
            package-lock.json; then
            echo "jetbrains=false" >> "$GITHUB_OUTPUT"
          else
            echo "jetbrains=true" >> "$GITHUB_OUTPUT"
          fi

  checks:
    needs: changes
    uses: ./.github/workflows/quality.yml
    with:
      run_jetbrains: ${{ needs.changes.outputs.jetbrains == 'true' }}
