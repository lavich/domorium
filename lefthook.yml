pre-commit:
  parallel: false
  commands:
    prettier:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,yaml,yml,md,css,html}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    kotlin-format:
      glob: "*.{kt,kts}"
      run: ./apps/jetbrains/gradlew -p apps/jetbrains spotlessCheck

pre-push:
  commands:
    quality:
      run: npm run check
